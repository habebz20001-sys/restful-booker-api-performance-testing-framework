name: API & Performance Testing Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  api-tests:
    name: Run Playwright API & Cucumber BDD Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run BDD API Tests
        run: npm test

  performance-tests:
    name: Run k6 Performance & Load Tests
    runs-on: ubuntu-latest
    needs: api-tests

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run k6 Load Test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: performance-tests/loadTest.js
